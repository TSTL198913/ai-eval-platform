[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = -v --tb=short -p no:cacheprovider
log_cli = false
log_level = WARNING
addopts_ci = -q --tb=short -n auto --timeout=60
addopts_local = -v --tb=short -n 4

markers =
    slow: 耗时较长的 E2E/压测用例，默认快速 CI 可跳过
    integration: 跨模块集成测试
    e2e: 端到端全链路测试
    redis: 需要 Redis 与 Celery Worker 的真异步测试
    contract: API/Schema 契约测试
    timeout: 测试超时标记

[junit]
testcase_prefixes = test_

[cache]
enabled = false