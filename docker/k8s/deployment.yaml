# Kubernetes 部署配置 - AI 评测平台
# 包含 Deployment、Service、HPA 自动扩缩容配置

---
# API 服务 Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-eval-api
  labels:
    app: ai-eval-platform
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-eval-platform
      component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-eval-platform
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: ai-eval-platform:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-eval-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ai-eval-secrets
                  key: redis-url
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: ai-eval-secrets
                  key: rabbitmq-url
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: ai-eval-platform
                    component: api
                topologyKey: kubernetes.io/hostname

---
# Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-eval-worker
  labels:
    app: ai-eval-platform
    component: worker
spec:
  replicas: 5
  selector:
    matchLabels:
      app: ai-eval-platform
      component: worker
  template:
    metadata:
      labels:
        app: ai-eval-platform
        component: worker
    spec:
      containers:
        - name: worker
          image: ai-eval-platform:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "src.workers.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-eval-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ai-eval-secrets
                  key: redis-url
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: ai-eval-secrets
                  key: celery-broker-url
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: ai-eval-api
  labels:
    app: ai-eval-platform
    component: api
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: ai-eval-platform
    component: api

---
# API HPA - 基于 CPU 和队列长度自动扩缩容
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-eval-api-hpa
  labels:
    app: ai-eval-platform
    component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-eval-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    # CPU 使用率指标
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # 内存使用率指标
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    # 自定义指标：请求速率（需要 Prometheus Adapter）
    - type: External
      external:
        metric:
          name: requests_per_second
          selector:
            matchLabels:
              app: ai-eval-platform
        target:
          type: AverageValue
          averageValue: "100"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max

---
# Worker HPA - 基于队列长度自动扩缩容
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-eval-worker-hpa
  labels:
    app: ai-eval-platform
    component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-eval-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
    # CPU 使用率指标
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    # 自定义指标：队列长度（需要 Prometheus Adapter）
    - type: External
      external:
        metric:
          name: celery_queue_length
          selector:
            matchLabels:
              queue: celery
        target:
          type: AverageValue
          averageValue: "50"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 5
          periodSeconds: 30
      selectPolicy: Max

---
# Secrets 配置（需要手动创建或使用外部密钥管理）
apiVersion: v1
kind: Secret
metadata:
  name: ai-eval-secrets
type: Opaque
stringData:
  database-url: "postgresql://user:password@postgres:5432/ai_eval"
  redis-url: "redis://redis:6379/0"
  rabbitmq-url: "amqp://guest:guest@rabbitmq:5672/"
  celery-broker-url: "amqp://guest:guest@rabbitmq:5672/"

---
# ConfigMap - 应用配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-eval-config
data:
  APP_NAME: "ai-eval-platform"
  APP_VERSION: "1.0.0"
  DEBUG: "false"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_BURST: "150"
  CIRCUIT_BREAKER_FAILURE_THRESHOLD: "5"
  CIRCUIT_BREAKER_TIMEOUT_SECONDS: "30"
