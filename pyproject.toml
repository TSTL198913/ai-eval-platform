# =====================================================================
# AI Evaluation Platform - 代码规范配置
# =====================================================================

[tool.coverage.run]
source = ["src"]
omit = [
    "src/__init__.py",
    "src/*/__init__.py",
    "src/**/__init__.py",
]

[tool.coverage.report]
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]

[tool.coverage.html]
directory = "htmlcov"

[tool.coverage.json]
output = "coverage.json"

# 覆盖率历史追踪配置
[tool.coverage.tracker]
save = true
source = ["src"]

# 增量覆盖率配置
[tool.coverage.incremental]
mode = "append"
history = ".coverage_history"

# 覆盖率历史报告
[tool.coverage.report_history]
enabled = true
history_file = ".coverage_history/trends.json"
trends_file = "coverage_trends.json"
generate_html = true
html_dir = "htmlcov_history"

[tool.black]
line-length = 100
target-version = ['py310']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | \.eggs
  | build
  | dist
  | __pycache__
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip_gitignore = true
skip = [".venv", "build", "dist"]

[tool.flake8]
max-line-length = 100
extend-ignore = ["E203", "W503", "E501"]
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "build",
    "dist",
    "*.egg-info",
]
per-file-ignores = [
    "__init__.py:F401",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
addopts = "-v --tb=short"

# =====================================================================
# CI/CD 配置（架构师建议：统一管理环境变量）
# =====================================================================
[tool.ci]
python_version = "3.10"
node_version = "18"
pip_index_url = "https://pypi.tuna.tsinghua.edu.cn/simple"
pip_trusted_host = "pypi.tuna.tsinghua.edu.cn"
coverage_threshold = 80

# =====================================================================
# Ruff 配置（统一代码质量工具）
# =====================================================================
[tool.ruff]
line-length = 100
target-version = "py310"
cache-dir = ".ruff_cache"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "E402",  # module level import not at top of file (required for FastAPI app initialization)
    "B008",  # do not perform function calls in argument defaults
    "C901",  # too complex
    "B017",  # assert blind exception (common in tests)
    "B904",  # raise without `from` (legacy code, will fix later)
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B017"]  # 允许测试中使用 pytest.raises(Exception)
"tests/unit/evaluator/test_evaluator_factory.py" = ["F811"]  # 测试中故意重复定义类
"tests/performance/*.py" = ["B023", "B007", "F841"]  # 性能测试中循环变量绑定是有意设计的
"tests/unit/test_evaluator_factory.py" = ["F811"]  # 测试中故意重复定义类

[tool.ruff.lint.isort]
known-first-party = ["src"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
