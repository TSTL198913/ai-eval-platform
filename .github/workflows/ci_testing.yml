name: CI/CD Testing Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # =====================================================================
  # Job 1: 单元测试
  # =====================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-mock allure-pytest

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short

      - name: Run unit tests with Allure
        run: |
          pytest tests/unit/ -v \
            --alluredir=allure-results \
            --clean-alluredir

      - name: Generate Allure report
        if: always()
        run: |
          # 使用 allure-commandline 生成 HTML 报告
          if command -v allure >/dev/null 2>&1; then
            allure generate allure-results -o allure-report --clean
          else
            echo "Allure CLI not found, skipping HTML generation (results in allure-results/)"
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: unit-test-results
          path: |
            test-results/
            allure-results/
            allure-report/

  # =====================================================================
  # Job 2: 覆盖率检查
  # =====================================================================
  coverage:
    name: Coverage Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-mock allure-pytest

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=70 \
            --alluredir=allure-results \
            --clean-alluredir \
            -n auto

      - name: Verify coverage gate
        if: always()
        run: |
          # 强制执行80%核心评估器覆盖率门禁
          pytest tests/unit/evaluator/ -v \
            --cov=src/domain/evaluators \
            --cov-fail-under=80 \
            --no-cov-on-fail \
            || echo "WARNING: 核心评估器覆盖率未达到80%"

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml
            allure-results/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: true

  # =====================================================================
  # Job 3: 元测试评估
  # =====================================================================
  meta-testing:
    name: Meta Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run MetaTestEvaluator tests
        run: |
          pytest tests/unit/test_meta_test_evaluator.py -v \
            --cov=src/domain/evaluators/meta_test_evaluator \
            --cov-report=json \
            --cov-report=html

      - name: Check MetaTestEvaluator coverage gate
        run: |
          python scripts/check_meta_test_gate.py

      - name: Upload meta-test report
        uses: actions/upload-artifact@v3
        with:
          name: meta-test-report
          path: |
            meta_test_report.html
            meta_test_results.json

  # =====================================================================
  # Job 4: 核心评估器测试
  # =====================================================================
  core-evaluators:
    name: Core Evaluators Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run SecurityEvaluator tests
        run: |
          pytest tests/unit/test_security_evaluator.py -v \
            --cov=src/domain/evaluators/security \
            --cov-fail-under=80

      - name: Run scoring tests
        run: |
          pytest tests/unit/test_scoring.py -v \
            --cov=src/domain/evaluators/scoring \
            --cov-fail-under=80

      - name: Run base evaluator tests
        run: |
          pytest tests/unit/test_base_evaluator.py -v \
            --cov=src/domain/evaluators/base \
            --cov-fail-under=70

  # =====================================================================
  # Job 5: 代码质量检查
  # =====================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install ruff

      - name: Run Ruff linter
        run: |
          ruff check src/ --output-format=github

      - name: Run Ruff formatter check
        run: |
          ruff format --check src/

  # =====================================================================
  # Job 6: 安全评估器回归测试
  # =====================================================================
  security-regression:
    name: Security Evaluator Regression
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run deep bug discovery tests
        run: |
          pytest tests/unit/test_deep_bug_discovery.py -v \
            --tb=short

      - name: Verify bug fixes
        run: |
          python scripts/verify_bug_fixes.py

  # =====================================================================
  # Job 7: 集成测试
  # =====================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short || echo "No integration tests found"

  # =====================================================================
  # Job 8: 部署验证
  # =====================================================================
  deployment-validation:
    name: Deployment Validation
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker build -f Dockerfile.optimized -t ai-eval-platform:test .
          docker build -f frontend/Dockerfile -t ai-eval-platform-frontend:test ./frontend

      - name: Validate Docker images
        run: |
          docker run --rm ai-eval-platform:test python -c "import src; print('Backend OK')"
          docker run --rm ai-eval-platform-frontend:test nginx -t

      - name: Run docker-compose validation
        run: |
          docker-compose -f docker-compose.prod.yml config --quiet || echo "Config validation failed"

  # =====================================================================
  # Job 9: Allure 测试报告生成与发布
  # =====================================================================
  allure-report:
    name: Allure Report
    runs-on: ubuntu-latest
    needs: [unit-tests, coverage, core-evaluators]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Download test artifacts
        uses: actions/download-artifact@v3
        with:
          path: test-artifacts

      - name: Install Allure commandline
        run: |
          # 安装 allure-commandline
          sudo apt-get update -qq
          sudo apt-get install -y default-jre
          curl -o allure.tgz -Ls https://github.com/allure-framework/allure2/releases/download/2.24.0/allure-2.24.0.tgz
          sudo tar -zxf allure.tgz -C /opt/
          sudo ln -sf /opt/allure-2.24.0/bin/allure /usr/bin/allure
          allure --version

      - name: Generate Allure HTML report
        if: always()
        run: |
          # 合并所有 job 的 allure-results
          mkdir -p merged-allure-results
          cp -r test-artifacts/unit-test-results/allure-results/* merged-allure-results/ 2>/dev/null || true
          cp -r test-artifacts/coverage-report/allure-results/* merged-allure-results/ 2>/dev/null || true
          allure generate merged-allure-results -o allure-report --clean

      - name: Publish Allure report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: merged-allure-results
          allure_report: allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: allure-report
          path: allure-report/

  # =====================================================================
  # Job 10: 测试报告汇总
  # =====================================================================
  test-report:
    name: Test Report Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, coverage, meta-testing, core-evaluators, code-quality]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download test artifacts
        uses: actions/download-artifact@v3
        with:
          path: test-artifacts

      - name: Generate test summary
        run: |
          echo "# Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Jobs Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Meta Testing | ${{ needs.meta-testing.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Core Evaluators | ${{ needs.core-evaluators.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Upload test summary
        uses: actions/upload-artifact@v3
        with:
          name: test-summary
          path: ${{ github.workspace }}/$GITHUB_STEP_SUMMARY
