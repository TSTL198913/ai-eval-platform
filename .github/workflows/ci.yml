name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
    paths-ignore: ['README.md', 'docs/**', '*.md']
  pull_request:
    branches: [main, master]
    paths-ignore: ['README.md', 'docs/**', '*.md']
  schedule:
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: '3.10'
  PIP_INDEX_URL: 'https://pypi.tuna.tsinghua.edu.cn/simple'
  PIP_TRUSTED_HOST: 'pypi.tuna.tsinghua.edu.cn'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      # 增加 ci_changed 监测自身变更
      src_changed: ${{ steps.detect.outputs.src_changed }}
      tests_changed: ${{ steps.detect.outputs.tests_changed }}
      docker_changed: ${{ steps.detect.outputs.docker_changed }}
      deps_changed: ${{ steps.detect.outputs.deps_changed }}
      ci_changed: ${{ steps.detect.outputs.ci_changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: detect
        with:
          filters: |
            src_changed: ['src/**', 'pyproject.toml', 'setup.py']
            tests_changed: ['tests/**']
            docker_changed: ['Dockerfile', 'docker-compose*.yml']
            deps_changed: ['requirements*.txt', 'pyproject.toml']
            ci_changed: ['.github/workflows/ci.yml']

  # 抽象统一的触发函数：减少重复的 if 逻辑
  # 任何代码变更或 CI 脚本变更均应触发核心检查
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.src_changed == 'true' || needs.detect-changes.outputs.tests_changed == 'true' || needs.detect-changes.outputs.ci_changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '${{ env.PYTHON_VERSION }}', cache: 'pip'}
      - run: pip install ruff && ruff check . && ruff format --check .

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    if: needs.lint.result == 'success'
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '${{ matrix.python-version }}', cache: 'pip'}
      - run: pip install -r requirements.txt && pytest tests/unit/ --cov=src --cov-fail-under=65

  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    if: needs.lint.result == 'success' && (needs.detect-changes.outputs.docker_changed == 'true' || needs.detect-changes.outputs.src_changed == 'true' || needs.detect-changes.outputs.deps_changed == 'true' || needs.detect-changes.outputs.ci_changed == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ai-eval-platform:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Start and verify container
        run: |
          # 启动容器
          docker run -d --name test-app -p 8000:8000 ai-eval-platform:test
          
          # 等待容器启动（最多 60 秒）
          echo "等待容器启动..."
          for i in {1..12}; do
            if docker ps | grep -q test-app; then
              echo "容器已启动"
              break
            fi
            echo "等待中... ($i/12)"
            sleep 5
          done
          
          # 检查容器状态
          if ! docker ps | grep -q test-app; then
            echo "错误: 容器未正常启动"
            docker logs test-app
            docker rm -f test-app
            exit 1
          fi
          
          # 健康检查（支持重试）
          echo "执行健康检查..."
          timeout=30
          interval=2
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            if curl -sf http://localhost:8000/health 2>/dev/null | grep -q "healthy"; then
              echo "健康检查通过: 服务正常运行"
              docker rm -f test-app
              exit 0
            fi
            echo "等待服务就绪... ($elapsed/$timeout)"
            sleep $interval
            elapsed=$((elapsed + interval))
          done
          
          # 健康检查失败
          echo "错误: 健康检查超时"
          docker logs test-app
          docker rm -f test-app
          exit 1

  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    needs: [lint, test, docker]
    if: always() # 强制执行
    steps:
      - name: Generate Summary
        run: |
          echo "### Pipeline Status" > $GITHUB_STEP_SUMMARY
          echo "- Lint: ${{ needs.lint.result || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: ${{ needs.test.result || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docker: ${{ needs.docker.result || 'skipped' }}" >> $GITHUB_STEP_SUMMARY