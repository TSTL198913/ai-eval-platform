# =====================================================================
# pip 配置文件 - 使用国内镜像源加速下载
# =====================================================================
# 
# 使用方法：
#   1. 将此文件复制到以下位置之一：
#      - Linux/Mac: ~/.pip/pip.conf 或 /etc/pip.conf
#      - Windows: %APPDATA%\pip\pip.ini 或 C:\ProgramData\pip\pip.ini
#   2. 或者在命令行中指定：
#      pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
#
# 可用的国内镜像源：
#   - 清华大学: https://pypi.tuna.tsinghua.edu.cn/simple (推荐)
#   - 阿里云: https://mirrors.aliyun.com/pypi/simple
#   - 中国科技大学: https://pypi.mirrors.ustc.edu.cn/simple
#   - 华中科技大学: https://pypi.hustunique.com/simple
#   - 腾讯云: https://mirrors.cloud.tencent.com/pypi/simple
#   - 华为云: https://repo.huaweicloud.com/repository/pypi/simple
#
# =====================================================================

[global]
# 使用清华大学镜像源（推荐，更新频率高，速度快）
index-url = https://pypi.tuna.tsinghua.edu.cn/simple

# 备用镜像源（当主镜像源不可用时自动切换）
extra-index-url = 
    https://mirrors.aliyun.com/pypi/simple
    https://pypi.mirrors.ustc.edu.cn/simple

# 信任镜像源（避免 SSL 证书验证问题）
trusted-host = 
    pypi.tuna.tsinghua.edu.cn
    mirrors.aliyun.com
    pypi.mirrors.ustc.edu.cn

# 超时设置（秒）
timeout = 120

# 下载重试次数
retries = 5

[install]
# 不使用缓存（避免缓存问题）
# no-cache-dir = false

# 使用用户安装（避免权限问题）
# user = true

# 升级所有依赖
# upgrade = true

[freeze]
# 冻结依赖时排除不需要的包
# exclude = pytest,pytest-cov,pytest-asyncio