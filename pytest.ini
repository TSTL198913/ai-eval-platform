# =====================================================================
# AI Evaluation Platform - Pytest Configuration
# =====================================================================
# 注意: pytest 配置主要在 pyproject.toml 中定义，此文件用于兼容
# =====================================================================

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
# 覆盖率配置
addopts = -v --tb=short --cov=src --cov-report=term-missing --cov-report=html

# 标记定义
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
    stress: Stress tests
    concurrency: Concurrency tests
    stability: Stability tests

# 忽略路径
norecursedirs = .git .venv __pycache__ .pytest_cache .coverage htmlcov

# 日志配置
log_cli = false
log_cli_level = INFO
