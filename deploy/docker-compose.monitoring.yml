# AI Eval Platform - Celery 监控栈

version: '3.8'

services:
  # Prometheus 服务
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-eval-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - monitoring

  # Pushgateway - 用于接收Celery推送的指标
  pushgateway:
    image: prom/pushgateway:latest
    container_name: ai-eval-pushgateway
    ports:
      - "9091:9091"
    restart: unless-stopped
    networks:
      - monitoring

  # Grafana 服务
  grafana:
    image: grafana/grafana:latest
    container_name: ai-eval-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../grafana/datasources:/etc/grafana/provisioning/datasources:ro
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - monitoring

  # Celery Worker（可选，用于分布式任务处理）
  celery-worker:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ai-eval-celery-worker
    command: celery -A src.workers.celery_app worker --loglevel=info --concurrency=4
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CELERY_PUSHGATEWAY_URL=http://pushgateway:9091
      - PYTHONPATH=/app
    volumes:
      - ..:/app
    depends_on:
      - rabbitmq
      - redis
      - pushgateway
    restart: unless-stopped
    networks:
      - monitoring

  # Celery Beat 调度器（可选，用于定期任务）
  celery-beat:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ai-eval-celery-beat
    command: celery -A src.workers.celery_app beat --loglevel=info
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - PYTHONPATH=/app
    volumes:
      - ..:/app
    depends_on:
      - rabbitmq
      - redis
    restart: unless-stopped
    networks:
      - monitoring

  # Celery 监控脚本
  celery-monitor:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ai-eval-celery-monitor
    command: python -m src.infra.monitoring.monitor_celery --interval=10
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672/
      - PUSHGATEWAY_URL=http://pushgateway:9091
      - PYTHONPATH=/app
    volumes:
      - ..:/app
    depends_on:
      - rabbitmq
      - pushgateway
    restart: unless-stopped
    networks:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
