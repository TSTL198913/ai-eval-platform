# =====================================================================
# AI Evaluation Platform - Prometheus Configuration
# =====================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ai-eval-platform'

# 告警规则文件
rule_files:
  - '/etc/prometheus/alert_rules.yml'

# Alertmanager 配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # =====================================================================
  # Prometheus 自身监控
  # =====================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: '/metrics'

  # =====================================================================
  # AI Evaluation API
  # =====================================================================
  - job_name: 'ai-eval-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics/prometheus'
    scrape_interval: 10s

  # =====================================================================
  # Celery Worker (通过 Redis Exporter)
  # =====================================================================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  # =====================================================================
  # RabbitMQ
  # =====================================================================
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
    metrics_path: '/api/metrics'

  # =====================================================================
  # PostgreSQL (通过 postgres_exporter)
  # =====================================================================
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']