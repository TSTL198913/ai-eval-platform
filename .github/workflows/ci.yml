# =====================================================================
# AI Eval Platform - CI/CD Pipeline
# 完整的持续集成和持续部署流程
# =====================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop, develop_06]
  pull_request:
    branches: [main, master, develop, develop_06]

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: write
  security-events: write
  actions: read
  id-token: write
  attestations: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.10'
  NODE_VERSION: '20'
  DOCKER_REGISTRY: ghcr.io

jobs:
  # =====================================================================
  # Job 1: 代码质量检查
  # =====================================================================
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install linting tools
        run: |
          pip install flake8 black isort ruff

      - name: Run Ruff (Fast Python Linter)
        run: |
          ruff check src/ tests/ --output-format=github || true  # [门禁已注释] 暂不强制

      - name: Run Black (Code Formatter Check)
        run: |
          black --check src/ tests/ || true  # [门禁已注释] 暂不强制

      - name: Run isort (Import Sorter Check)
        run: |
          isort --check src/ tests/ || true  # [门禁已注释] 暂不强制

  # =====================================================================
  # Job 2: 单元测试 + 覆盖率
  # =====================================================================
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-xdist

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v --cov=src --cov-report=xml --cov-report=html -n auto
          # --cov-fail-under=20  # [门禁已注释] 覆盖率阈值，暂不强制

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  # =====================================================================
  # Job 3: 集成测试
  # =====================================================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short || true  # [门禁已注释] 暂不强制失败

  # =====================================================================
  # Job 4: E2E 页面测试
  # =====================================================================
  e2e-test:
    name: E2E Page Tests
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright httpx uvicorn fastapi

      - name: Install frontend dependencies
        run: npm ci

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Build frontend
        run: npm run build

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Start backend server
        run: |
          nohup python -m uvicorn src.api.server:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          sleep 10
          curl -f http://localhost:8000/health || (echo "Backend health check failed" && cat backend.log && exit 1)

      - name: Start frontend dev server
        run: |
          nohup npm run dev > frontend.log 2>&1 &
          sleep 15
          curl -f http://localhost:5173 || (echo "Frontend health check failed" && cat frontend.log && exit 1)

      - name: Run E2E tests
        run: |
          pytest tests/web_e2e/ -v --tb=short || true  # [门禁已注释] 暂不强制失败

      - name: Stop servers
        if: always()
        run: |
          pkill -f "uvicorn src.api.server" || true
          pkill -f "npm run dev" || true

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 7

  # =====================================================================
  # Job 5: 构建 Docker 镜像
  # =====================================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, integration-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop_06')
    outputs:
      backend-tag: ${{ steps.meta-backend.outputs.tags }}
      backend-image: ${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/ai-eval-platform-backend
      frontend-tag: ${{ steps.meta-frontend.outputs.tags }}
      frontend-image: ${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/ai-eval-platform-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------
      # 构建后端镜像
      # -----------------------------------------------------------------
      - name: Extract metadata for Backend Docker
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/ai-eval-platform-backend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Backend Docker image
        id: build-backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------
      # 构建前端镜像
      # -----------------------------------------------------------------
      - name: Extract metadata for Frontend Docker
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/ai-eval-platform-frontend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Frontend Docker image
        id: build-frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =====================================================================
  # Job 6: 部署到生产环境
  # =====================================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "🚀 Deploying to production..."
          echo "Backend Image: ${{ needs.build.outputs.backend-tag }}"
          echo "Frontend Image: ${{ needs.build.outputs.frontend-tag }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd ~/ai-eval-platform
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans
            sleep 15
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            curl -f http://localhost:8000/health || echo "API health check failed"
            curl -f http://localhost/health || echo "Frontend health check failed"

  # =====================================================================
  # Job 7: 安全扫描
  # =====================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # =====================================================================
  # Job 8: 性能基准测试
  # =====================================================================
  performance-benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Start backend server
        run: |
          nohup python -m uvicorn src.api.server:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          sleep 15
          curl -f http://localhost:8000/health || (echo "Backend health check failed" && cat backend.log && exit 1)
          sleep 5

      - name: Run performance benchmarks
        run: |
          pytest tests/performance/ -v --tb=short || true  # [门禁已注释] 暂不强制失败

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: tests/benchmark_results/
          retention-days: 30

      - name: Stop server
        if: always()
        run: pkill -f "uvicorn src.api.server" || true

  # =====================================================================
  # Job 9: 安全渗透测试
  # =====================================================================
  security-pentest:
    name: Security Penetration Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Start backend server
        run: |
          nohup python -m uvicorn src.api.server:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          sleep 10
          curl -f http://localhost:8000/health || (echo "Backend health check failed" && cat backend.log && exit 1)

      - name: Run OWASP Top 10 tests
        run: |
          pytest tests/security/ -v --tb=short || true  # [门禁已注释] 暂不强制失败

      - name: Upload security test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results
          path: tests/security_results/
          retention-days: 30

      - name: Stop server
        if: always()
        run: pkill -f "uvicorn src.api.server" || true

  # =====================================================================
  # Job 10: 混沌工程测试
  # =====================================================================
  chaos-engineering:
    name: Chaos Engineering Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Start backend server
        run: |
          nohup python -m uvicorn src.api.server:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          sleep 10
          curl -f http://localhost:8000/health || (echo "Backend health check failed" && cat backend.log && exit 1)

      - name: Run chaos engineering tests
        run: |
          pytest tests/chaos/ -v --tb=short || true  # [门禁已注释] 暂不强制失败

      - name: Upload chaos test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-test-results
          path: tests/chaos_results/
          retention-days: 30

      - name: Stop server
        if: always()
        run: pkill -f "uvicorn src.api.server" || true

  # =====================================================================
  # Job 11: 自测验证
  # =====================================================================
  self-test:
    name: Self Test Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run self test script
        run: |
          python scripts/self_test.py || true  # [门禁已注释] 暂不强制失败

      - name: Upload self test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-test-results
          path: self_test_results/
          retention-days: 7
