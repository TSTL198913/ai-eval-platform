[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
markers =
    slow: 耗时较长的 E2E/压测用例，默认快速 CI 可跳过
    integration: 跨模块集成测试
    e2e: 端到端全链路测试
    redis: 需要 Redis 与 Celery Worker 的真异步测试
    contract: API/Schema 契约测试
addopts = -v --tb=short

# pytest-xdist 并行测试配置
# 使用方式: pytest -n auto --dist=loadscope
# -n auto: 自动检测 CPU 核心数
# --dist=loadscope: 按模块分组测试，保持同类测试在一起

# 覆盖率配置
# 使用方式: pytest --cov=src --cov-report=term --cov-report=html --cov-fail-under=80
# --cov=src: 指定覆盖率检测的源目录
# --cov-report=term: 在终端显示覆盖率报告
# --cov-report=html: 生成 HTML 覆盖率报告
# --cov-fail-under=80: 覆盖率低于 80% 时测试失败
