[pytest]
# AI Eval Platform 2026工业级测试配置
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    -v
    --strict-markers
    --tb=short
    --durations=10
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --alluredir=allure-results
    --clean-alluredir
markers =
    slow: 慢测试（>5秒）
    concurrent: 并发安全测试（必过门禁）
    integration: 集成测试
    e2e: 端到端测试
    meta: 元测试（验证测试质量）
    security: 安全相关测试
    smoke: 冒烟测试
    performance: 性能测试
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 覆盖率门禁（通过 pytest-cov 启用，详见 CI 配置）
# 命令：pytest --cov-fail-under=80
# 报告查看：allure serve allure-results
