# =====================================================================
# AI Evaluation Platform - Alertmanager Configuration
# =====================================================================

global:
  resolve_timeout: 5m
  # SMTP 配置 (可选，用于邮件告警)
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alertmanager@example.com'
  # smtp_auth_username: 'alertmanager@example.com'
  # smtp_auth_password: 'password'

# 告警路由配置
route:
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-receiver'
  
  # 子路由配置
  routes:
    # 关严重警发送到邮件
    - match:
        severity: critical
      receiver: 'critical-receiver'
      continue: true
    
    # 警告级别告警
    - match:
        severity: warning
      receiver: 'warning-receiver'

# 告警接收器配置
receivers:
  # 默认接收器 (Webhook)
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://api:8000/alerts/webhook'
        send_resolved: true
  
  # 关严重警接收器 (邮件 + Webhook)
  - name: 'critical-receiver'
    webhook_configs:
      - url: 'http://api:8000/alerts/webhook'
        send_resolved: true
    # email_configs:
    #   - to: 'admin@example.com'
    #     send_resolved: true
  
  # 警告级别接收器
  - name: 'warning-receiver'
    webhook_configs:
      - url: 'http://api:8000/alerts/webhook'
        send_resolved: true

# 告警抑制规则
inhibit_rules:
  # 如果服务宕机，抑制该服务的其他告警
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      service: '.*'
    equal: ['service']
  
  # 如果熔断器打开，抑制 LLM 响应时间告警
  - source_match:
      alertname: 'CircuitBreakerOpen'
    target_match:
      alertname: 'LLMHighResponseTime'
    equal: ['service']