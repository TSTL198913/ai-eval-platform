# AI Eval Platform - Prometheus 配置

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # AI Eval Platform API 服务
  - job_name: 'ai-eval-platform-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # Pushgateway - Celery任务指标推送端点
  - job_name: 'pushgateway'
    static_configs:
      - targets: ['pushgateway:9091']
    scrape_interval: 10s

  # Prometheus 自我监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Celery Worker 监控（通过Pushgateway）
  - job_name: 'celery-tasks'
    static_configs:
      - targets: ['pushgateway:9091']
    metrics_path: '/metrics/job/celery_tasks'
    scrape_interval: 10s

  # Celery 队列监控（通过Pushgateway）
  - job_name: 'celery-monitor'
    static_configs:
      - targets: ['pushgateway:9091']
    metrics_path: '/metrics/job/celery_monitor'
    scrape_interval: 10s
