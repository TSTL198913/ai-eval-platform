# Prometheus 配置

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # AI Evaluation API
  - job_name: 'ai-eval-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics/prometheus'

  # RabbitMQ (如果启用 management插件)
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
