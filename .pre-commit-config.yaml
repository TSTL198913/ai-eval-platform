repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: unit-tests
        name: Run Unit Tests
        entry: python -m pytest tests/unit -v --tb=short
        language: system
        pass_filenames: false
        always_run: true

      - id: assertion-strength
        name: Check Assertion Strength
        entry: python tests/utils/assertion_analyzer.py tests/unit
        language: system
        pass_filenames: false
        always_run: true

      - id: coverage-check
        name: Check Coverage
        entry: bash -c "coverage run -m pytest tests/unit && coverage report --fail-under=80"
        language: system
        pass_filenames: false
        always_run: false
        stages: [push]

      - id: reliability-tests
        name: Run Reliability Tests
        entry: python -m pytest tests/reliability -v --tb=short
        language: system
        pass_filenames: false
        always_run: false
        stages: [push]