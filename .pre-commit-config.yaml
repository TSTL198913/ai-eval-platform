# =====================================================================
# AI Eval Platform - Pre-commit Hook Configuration
# 优化：排除 .venv 和其他无关目录，大幅提升运行速度
# =====================================================================

repos:
  # -------------------------------------------------------------------------
  # Ruff - 代码检查和修复（比 black + isort + flake8 更快）
  # -------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        name: Ruff Check & Fix
        args: [--fix, --config, pyproject.toml]
        description: "Run Ruff linter with auto-fix"
        exclude: |
          (?x)^(
            \.venv/
          | \.eggs/
          | \.tox/
          | build/
          | dist/
          | \.git/
          | \.ruff_cache/
          | node_modules/
          | .*\.egg-info/
          | scripts/fix_classification\.py
          | scripts/fix_server\.py
          )$

      - id: ruff-format
        name: Ruff Format
        args: [--config, pyproject.toml]
        description: "Run Ruff formatter"
        exclude: |
          (?x)^(
            \.venv/
          | \.eggs/
          | \.tox/
          | build/
          | dist/
          | \.git/
          | \.ruff_cache/
          | node_modules/
          | .*\.egg-info/
          | scripts/fix_classification\.py
          | scripts/fix_server\.py
          )$

  # -------------------------------------------------------------------------
  # Trailing Whitespace - 移除尾随空格
  # -------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        description: "Trim trailing whitespace"
        exclude: |
          (?x)^(
            \.venv/
          | \.eggs/
          | \.tox/
          | build/
          | dist/
          | \.git/
          | \.ruff_cache/
          | node_modules/
          | .*\.egg-info/
          | scripts/fix_classification\.py
          | scripts/fix_server\.py
          )$

  # -------------------------------------------------------------------------
  # End of File - 确保文件以换行符结尾
  # -------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: end-of-file-fixer
        description: "Ensure files end with newline"
        exclude: |
          (?x)^(
            \.venv/
          | \.eggs/
          | \.tox/
          | build/
          | dist/
          | \.git/
          | \.ruff_cache/
          | node_modules/
          | .*\.egg-info/
          )$

  # -------------------------------------------------------------------------
  # Check YAML - YAML文件格式检查
  # -------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
        description: "Check YAML file formatting"
        exclude: |
          (?x)^(
            docker/k8s/deployment\.yaml
          )$

# =====================================================================
# 安装说明
# =====================================================================
# 1. 安装pre-commit: pip install pre-commit
# 2. 安装钩子: pre-commit install
# 3. 手动运行所有钩子: pre-commit run --all-files
# 4. 跳过钩子: git commit --no-verify
# 5. 卸载钩子: pre-commit uninstall
# =====================================================================
