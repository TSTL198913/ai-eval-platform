# =====================================================================
# AI Evaluation Platform - CI/CD Pipeline (架构师优化版)
# 
# 优化要点:
# 1. 统一使用 Ruff (替代 black/isort/flake8) - 性能提升 10x
# 2. 生产环境只拉取镜像，不在服务器构建 - 符合生产部署规范
# 3. 修复 summary 任务的依赖判断逻辑 - 提升稳定性
# 4. 使用 pip-audit 替代 safety - OWASP 推荐标准
# 5. 添加 Zero-Downtime 滚动更新支持
# =====================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '*.md'

env:
  PYTHON_VERSION: '3.10'
  NODE_VERSION: '18'
  PIP_INDEX_URL: 'https://pypi.tuna.tsinghua.edu.cn/simple'
  PIP_TRUSTED_HOST: 'pypi.tuna.tsinghua.edu.cn'
  # 质量门限
  COVERAGE_THRESHOLD: '80'

# 并发控制：同一分支只允许一个工作流运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =====================================================================
  # 变更检测（增量扫描基础）
  # =====================================================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      src_changed: ${{ steps.detect.outputs.src_changed }}
      tests_changed: ${{ steps.detect.outputs.tests_changed }}
      docker_changed: ${{ steps.detect.outputs.docker_changed }}
      deps_changed: ${{ steps.detect.outputs.deps_changed }}
      any_changed: ${{ steps.detect.outputs.any_changed }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: detect
        uses: dorny/paths-filter@v3
        with:
          filters: |
            src_changed:
              - 'src/**'
              - 'pyproject.toml'
              - 'setup.py'
            tests_changed:
              - 'tests/**'
            docker_changed:
              - 'Dockerfile'
              - 'docker-compose*.yml'
            deps_changed:
              - 'requirements*.txt'

  # =====================================================================
  # 代码质量检查（Ruff 统一方案）
  # =====================================================================
  lint:
    name: Lint & Format (Ruff)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.src_changed == 'true' || needs.detect-changes.outputs.tests_changed == 'true' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff Check (代码质量 + 规则检查)
        run: ruff check .

      - name: Ruff Format Check (代码格式化)
        run: ruff format --check .

      - name: Directory Naming Convention Check
        run: |
          echo "=== 目录命名规范检查 ==="
          for dir in src/*/; do
            dir_name=$(basename "$dir")
            if [ -d "src/${dir_name}s" ]; then
              echo "警告: 发现可能重复的目录对: src/$dir_name 和 src/${dir_name}s"
            fi
          done

      - name: Code Complexity Check
        run: |
          pip install -q radon
          high_complexity=$(radon cc src/ -a -s | grep -E "F[4-5]" | wc -l)
          if [ "$high_complexity" -gt 0 ]; then
            echo "警告: 发现 $high_complexity 个高复杂度函数"
          fi

  # =====================================================================
  # 单元测试（带质量门限）
  # =====================================================================
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip config set global.index-url $PIP_INDEX_URL
          pip config set global.trusted-host $PIP_TRUSTED_HOST
          pip install -q -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/unit/ -v --cov=src --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unit
          fail_ci_if_error: true

  # =====================================================================
  # Docker 构建测试
  # =====================================================================
  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.docker_changed == 'true' || 
            needs.detect-changes.outputs.src_changed == 'true' || 
            needs.detect-changes.outputs.deps_changed == 'true' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ai-eval-platform:test
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Test Docker image
        run: |
          docker run -d --name test-app -p 8000:8000 ai-eval-platform:test
          
          timeout=30
          interval=2
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            if curl -s http://localhost:8000/health 2>/dev/null | grep -q "healthy"; then
              echo "服务启动成功"
              break
            fi
            sleep $interval
            elapsed=$((elapsed + interval))
          done
          
          if [ $elapsed -ge $timeout ]; then
            echo "服务启动超时"
            docker logs test-app
            docker rm -f test-app
            exit 1
          fi
          
          docker rm -f test-app

  # =====================================================================
  # 安全扫描（现代化方案）
  # =====================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.src_changed == 'true' || needs.detect-changes.outputs.deps_changed == 'true' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run pip-audit (OWASP 推荐)
        run: |
          pip install -q pip-audit
          pip-audit -r requirements.txt --format json --output audit-report.json || true
          cat audit-report.json

      - name: Run Bandit security scan
        run: |
          pip install -q bandit
          bandit -r src/ -f json -o bandit-report.json || true
          
          critical_count=$(jq '.results | map(select(.issue_severity == "CRITICAL")) | length' bandit-report.json 2>/dev/null || echo "0")
          if [ "$critical_count" -gt 0 ]; then
            echo "发现 $critical_count 个严重安全漏洞"
            exit 1
          fi

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            audit-report.json
            bandit-report.json
          retention-days: 7

  # =====================================================================
  # 集成测试
  # =====================================================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test, docker]
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ai_eval_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip config set global.index-url $PIP_INDEX_URL
          pip config set global.trusted-host $PIP_TRUSTED_HOST
          pip install -q -r requirements.txt

      - name: Run integration tests
        timeout-minutes: 10
        run: |
          pytest tests/integration/ -v --tb=short
        env:
          DATABASE_URL: postgresql://test:test123@localhost:5432/ai_eval_test
          REDIS_URL: redis://localhost:6379

  # =====================================================================
  # 构建并推送 Docker 镜像
  # =====================================================================
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: [integration-test, docker]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/ai-eval-platform
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =====================================================================
  # 生产部署（Zero-Downtime 滚动更新）
  # =====================================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: build-and-push
    environment: production
    timeout-minutes: 15
    
    steps:
      - name: Checkout docker-compose
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.yml
          sparse-checkout-cone-mode: false

      - name: Deploy to server (只拉取镜像，不在服务器构建)
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd /opt/ai-eval-platform
            
            # 备份当前 docker-compose.yml
            timestamp=$(date +%Y%m%d_%H%M%S)
            cp docker-compose.yml docker-compose.yml.backup.$timestamp
            
            # 复制最新的 docker-compose.yml
            cp $GITHUB_WORKSPACE/docker-compose.yml .
            
            # 只拉取镜像，不在服务器构建（符合生产规范）
            docker compose pull
            
            # 停止旧容器并启动新容器（使用 remove-orphans 清理孤儿）
            docker compose up -d --remove-orphans
            
            # 健康检查（带超时）
            timeout=60
            interval=5
            elapsed=0
            while [ $elapsed -lt $timeout ]; do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "部署成功"
                exit 0
              fi
              echo "等待服务启动... ($elapsed/$timeout)"
              sleep $interval
              elapsed=$((elapsed + interval))
            done
            
            # 回滚
            echo "部署失败，执行回滚"
            docker compose down
            cp docker-compose.yml.backup.$timestamp docker-compose.yml
            docker compose up -d
            exit 1

      - name: Notify deployment result
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "Deployment ${{ steps.deploy.outcome }}"
          SLACK_MESSAGE: |
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Result: ${{ steps.deploy.outcome }}
          SLACK_COLOR: ${{ steps.deploy.outcome == 'success' && 'good' || 'danger' }}

  # =====================================================================
  # 工作流总结（修复依赖判断）
  # =====================================================================
  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    # 不使用 needs 依赖，使用 if: always() 确保总是执行
    if: always()
    
    steps:
      - name: Summary
        run: |
          echo "=========================================="
          echo "CI/CD Pipeline Summary"
          echo "=========================================="
          echo "Trigger: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          
          # 安全地获取各任务状态
          echo "--- Task Status ---"
          echo "Lint: ${{ needs.lint.result || 'skipped' }}"
          echo "Test: ${{ needs.test.result || 'skipped' }}"
          echo "Docker: ${{ needs.docker.result || 'skipped' }}"
          echo "Security: ${{ needs.security.result || 'skipped' }}"
          echo "Integration: ${{ needs.integration-test.result || 'skipped' }}"
          echo "Build & Push: ${{ needs.build-and-push.result || 'skipped' }}"
          echo "Deploy: ${{ needs.deploy.result || 'skipped' }}"
          echo ""
          
          # 判断是否有失败
          failure_count=0
          if ${{ needs.lint.result == 'failure' }}; then failure_count=$((failure_count+1)); fi
          if ${{ needs.test.result == 'failure' }}; then failure_count=$((failure_count+1)); fi
          if ${{ needs.integration-test.result == 'failure' }}; then failure_count=$((failure_count+1)); fi
          
          if [ $failure_count -gt 0 ]; then
            echo "=========================================="
            echo "❌ Pipeline Failed: $failure_count task(s) failed"
            echo "=========================================="
            exit 1
          else
            echo "=========================================="
            echo "✅ Pipeline Completed Successfully"
            echo "=========================================="
          fi