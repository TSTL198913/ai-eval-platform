# =====================================================================
# AI Evaluation Platform - Docker Compose (Production)
# 生产环境配置 - 使用预构建镜像，不在服务器上构建
# =====================================================================

services:
  # ---------------------------------------------------------------------
  # PostgreSQL 数据库
  # ---------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: ai-eval-postgres
    environment:
      POSTGRES_DB: ai_eval
      POSTGRES_USER: ${POSTGRES_USER:-eval}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eval123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eval}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-eval-network

  # ---------------------------------------------------------------------
  # Redis 缓存/锁服务
  # ---------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ai-eval-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-eval-network

  # ---------------------------------------------------------------------
  # RabbitMQ 消息队列
  # ---------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ai-eval-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-eval-network

  # ---------------------------------------------------------------------
  # API 服务 (FastAPI) - 生产环境使用预构建镜像
  # ---------------------------------------------------------------------
  api:
    image: ${DOCKER_REGISTRY:-ghcr.io/tstl198913}/ai-eval-platform:${IMAGE_TAG:-latest}
    container_name: ai-eval-api
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-eval}:${POSTGRES_PASSWORD:-eval123}@postgres:5432/ai_eval
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ENV=production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        max_attempts: 3
    networks:
      - ai-eval-network

  # ---------------------------------------------------------------------
  # Celery Worker (任务处理) - 生产环境使用预构建镜像
  # ---------------------------------------------------------------------
  worker:
    image: ${DOCKER_REGISTRY:-ghcr.io/tstl198913}/ai-eval-platform:${IMAGE_TAG:-latest}
    container_name: ai-eval-worker
    command: celery -A src.workers.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-eval}:${POSTGRES_PASSWORD:-eval123}@postgres:5432/ai_eval
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
      restart_policy:
        condition: on-failure
        max_attempts: 3
    networks:
      - ai-eval-network

# =====================================================================
# 网络和存储卷
# =====================================================================
networks:
  ai-eval-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
