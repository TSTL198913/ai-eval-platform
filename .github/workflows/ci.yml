# =====================================================================
# AI Evaluation Platform - CI/CD Pipeline (最终生产版)
#
# 核心特性:
# - 基于变更检测的条件执行，实现最快反馈
# - 单元测试 100% 覆盖率强制门禁
# - 并行最大化 + 智能缓存
# - 集成测试自动数据库迁移
# - 安全扫描按事件类型差异化容错
# - CD 部署含完整回滚机制
# - 可配置健康检查
# =====================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
    paths-ignore: ['README.md', 'docs/**', '*.md']
  pull_request:
    branches: [main, master]
    paths-ignore: ['README.md', 'docs/**', '*.md']
  schedule:
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: '3.10'
  PIP_INDEX_URL: 'https://pypi.tuna.tsinghua.edu.cn/simple'
  PIP_TRUSTED_HOST: 'pypi.tuna.tsinghua.edu.cn'
  COVERAGE_THRESHOLD: '100'
  HEALTH_ENDPOINT: 'http://localhost:8000/health'
  HEALTH_TIMEOUT: 60
  DOCKER_IMAGE_NAME: 'ai-eval-platform'
  DOCKER_BUILDKIT: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ------------------------------------------------------------------
  # 变更检测 – 为后续任务提供决策依据
  # ------------------------------------------------------------------
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      src_changed: ${{ steps.detect.outputs.src_changed }}
      tests_changed: ${{ steps.detect.outputs.tests_changed }}
      docker_changed: ${{ steps.detect.outputs.docker_changed }}
      deps_changed: ${{ steps.detect.outputs.deps_changed }}
      ci_changed: ${{ steps.detect.outputs.ci_changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: detect
        with:
          filters: |
            src_changed: ['src/**', 'pyproject.toml', 'setup.py']
            tests_changed: ['tests/**']
            docker_changed: ['Dockerfile', 'docker-compose*.yml']
            deps_changed: ['requirements*.txt', 'pyproject.toml', 'setup.py']
            ci_changed: ['.github/workflows/ci.yml']

  # ------------------------------------------------------------------
  # 代码质量检查 – 低开销，始终执行
  # ------------------------------------------------------------------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install Ruff
        run: pip install ruff
      - name: Ruff Check
        run: ruff check . --cache-dir=.ruff_cache
      - name: Ruff Format Check
        run: ruff format --check . --cache-dir=.ruff_cache

  # ------------------------------------------------------------------
  # 单元测试 – 仅在有源码/测试/依赖变更时执行，矩阵并行
  # ------------------------------------------------------------------
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [lint, detect-changes]
    if: |
      needs.detect-changes.outputs.src_changed == 'true' ||
      needs.detect-changes.outputs.tests_changed == 'true' ||
      needs.detect-changes.outputs.deps_changed == 'true'
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-cov pytest-xdist
      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -n auto -v \
            --cov=src --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }}
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: unit-${{ matrix.python-version }}

  # ------------------------------------------------------------------
  # Docker 构建验证 – 仅当相关文件变更时执行
  # ------------------------------------------------------------------
  docker-validate:
    name: Docker Build & Validate
    runs-on: ubuntu-latest
    needs: [lint, detect-changes]
    if: |
      needs.detect-changes.outputs.docker_changed == 'true' ||
      needs.detect-changes.outputs.src_changed == 'true' ||
      needs.detect-changes.outputs.deps_changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.DOCKER_IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Health check
        run: |
          docker run -d --name test-app -p 8000:8000 ${{ env.DOCKER_IMAGE_NAME }}:test
          timeout=${{ env.HEALTH_TIMEOUT }}
          interval=5
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            if curl -sf ${{ env.HEALTH_ENDPOINT }} > /dev/null 2>&1; then
              echo "Health check passed"
              docker rm -f test-app
              exit 0
            fi
            echo "Waiting for health endpoint... ($elapsed/$timeout)"
            sleep $interval
            elapsed=$((elapsed + interval))
          done
          echo "Health check failed after ${timeout}s"
          docker logs test-app
          docker rm -f test-app
          exit 1

  # ------------------------------------------------------------------
  # 安全扫描 – 定时任务不阻断，PR/推送时强制通过
  # ------------------------------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      github.event_name == 'schedule' ||
      needs.detect-changes.outputs.deps_changed == 'true' ||
      needs.detect-changes.outputs.src_changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install security tools
        run: pip install pip-audit bandit
      - name: Run pip-audit
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt
          else
            echo "No requirements.txt found, skipping pip-audit"
          fi
        continue-on-error: ${{ github.event_name == 'schedule' }}
      - name: Run Bandit
        run: bandit -r src/ -f json -o bandit-report.json
        continue-on-error: ${{ github.event_name == 'schedule' }}
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  # ------------------------------------------------------------------
  # 集成测试 – 真实 Redis/PostgreSQL，自动运行迁移
  # ------------------------------------------------------------------
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    if: needs.test.result == 'success'
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ai_eval_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test123
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install migration tool (if Alembic used)
        run: |
          if [ -f "alembic.ini" ] || grep -q "alembic" requirements.txt 2>/dev/null; then
            pip install alembic
          fi
      - name: Run database migrations
        run: |
          if [ -f "alembic.ini" ]; then
            alembic upgrade head
          elif [ -f "manage.py" ]; then
            python manage.py migrate
          else
            echo "No migration tool detected, skipping"
          fi
        env:
          DATABASE_URL: postgresql://test:test123@localhost:5432/ai_eval_test
      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short
        env:
          DATABASE_URL: postgresql://test:test123@localhost:5432/ai_eval_test
          REDIS_URL: redis://localhost:6379

  # ------------------------------------------------------------------
  # E2E 测试 – 仅 main 分支且集成测试通过后执行
  # ------------------------------------------------------------------
  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && needs.integration-test.result == 'success'
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ai_eval_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test123
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt locust
      - name: Run E2E tests
        run: pytest tests/e2e/ -v --tb=short
        env:
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://test:test123@localhost:5432/ai_eval_test

  # ------------------------------------------------------------------
  # CD: 构建并推送 Docker 镜像 – 仅 main 分支且 E2E 通过
  # ------------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [e2e-test, docker-validate]
    if: github.ref == 'refs/heads/main' && needs.e2e-test.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Generate deployment manifest
        run: |
          cat <<EOF > manifest.json
          {
            "version": "${{ github.sha }}",
            "branch": "${{ github.ref }}",
            "commit": "${{ github.sha }}",
            "author": "${{ github.actor }}",
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "docker_image": "${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}",
            "workflow_run_id": "${{ github.run_id }}"
          }
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: build-manifest
          path: manifest.json

  # ------------------------------------------------------------------
  # CD: 生产环境部署 + 原子回滚
  # ------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Deploy with rollback
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd /opt/ai-eval-platform

            # 记录当前运行的 app 服务镜像 ID
            current_image=$(docker compose ps -q app 2>/dev/null | head -1 | xargs docker inspect --format='{{.Image}}' 2>/dev/null || echo "")
            timestamp=$(date +%Y%m%d_%H%M%S)
            cp docker-compose.yml docker-compose.yml.backup.$timestamp

            # 强制同步远程 main 分支，避免冲突
            git fetch origin main
            git reset --hard origin/main

            docker compose pull
            docker compose up -d --remove-orphans

            # 健康检查
            timeout=${{ env.HEALTH_TIMEOUT }}
            interval=5
            elapsed=0
            healthy=false
            while [ $elapsed -lt $timeout ]; do
              if curl -sf ${{ env.HEALTH_ENDPOINT }} > /dev/null 2>&1; then
                healthy=true
                break
              fi
              echo "Waiting for health... ($elapsed/$timeout)"
              sleep $interval
              elapsed=$((elapsed + interval))
            done

            if [ "$healthy" = true ]; then
              echo "Deployment successful"
              docker image prune -a --filter "until=24h" -f
              exit 0
            fi

            # ========== 自动回滚 ==========
            echo "Deployment failed, initiating rollback"
            docker compose down

            # 恢复上一个 compose 文件
            if [ -f docker-compose.yml.backup.$timestamp ]; then
              cp docker-compose.yml.backup.$timestamp docker-compose.yml
            fi

            # 精确替换 app 服务的镜像（优先 yq，降级 sed）
            if [ -n "$current_image" ]; then
              if command -v yq >/dev/null 2>&1; then
                yq eval ".services.app.image = \"$current_image\"" -i docker-compose.yml
              else
                # 限定 services.app 块内替换 image 行
                sed -i '/^services:/,/^[^ ]/ { /^  app:/,/^  / { s|image:.*|image: '"$current_image"'| } }' docker-compose.yml
              fi
            fi

            docker compose up -d

            sleep 10
            if curl -sf ${{ env.HEALTH_ENDPOINT }} > /dev/null 2>&1; then
              echo "Rollback successful, service restored"
              exit 1
            else
              echo "Rollback also failed! Manual intervention required"
              exit 1
            fi

  # ------------------------------------------------------------------
  # 最终摘要 – 聚合所有任务状态，关键任务失败则整体失败
  # ------------------------------------------------------------------
  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, lint, test, docker-validate, security, integration-test, e2e-test, build-and-push, deploy]
    if: always()
    steps:
      - name: Build status table
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests (3.10 & 3.11) | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Validate | ${{ needs.docker-validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-test.result }} |" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "| E2E Tests | ${{ needs.e2e-test.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Build & Push | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Fail workflow if critical jobs failed
        if: |
          needs.lint.result != 'success' ||
          needs.test.result != 'success' ||
          needs.integration-test.result != 'success'
        run: |
          echo "::error::Critical jobs (Lint, Unit Tests, Integration Tests) must pass"
          exit 1