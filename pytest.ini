[pytest]
# 默认跳过标记为external的测试（集成测试）
# 使用 `pytest -m external` 运行集成测试
markers =
    external: marks tests as external integration tests (deselect with '-m "not external"')
    unit: marks tests as unit tests
    integration: marks tests as integration tests

# 默认跳过external测试，并行化配置
# 使用方法：pytest -n auto（自动检测CPU核心）
# 使用方法：pytest -n 4（指定4个worker）
# 使用方法：pytest -m external（运行集成测试）
addopts = -v --tb=short -m "not external" --dist loadscope

# 测试路径
testpaths = tests/unit
norecursedirs = .git .tox dist build *.egg htmlcov
python_files = test_*.py
python_classes = Test*
python_functions = test_*
